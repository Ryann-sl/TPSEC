<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption - Cyber Security Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .navbar {
            background: var(--bg-secondary);
            padding: var(--spacing-md);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            margin-bottom: var(--spacing-xl);
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .algorithm-selector {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
        }

        .algorithm-btn {
            flex: 1;
            min-width: 150px;
        }

        .algorithm-btn.active {
            background: var(--gradient-cyber);
            box-shadow: var(--shadow-neon-cyan);
        }

        .result-box {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            font-family: var(--font-mono);
            word-break: break-all;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">🔑 Encryption Module</div>
            <button class="btn btn-outline" onclick="navigateTo('dashboard.html')">← Back to Dashboard</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center mb-3">Encryption / Decryption</h1>
        <p class="text-center text-secondary mb-4">Choose an algorithm and encrypt or decrypt messages</p>

        <div class="algorithm-selector">
            <button class="btn algorithm-btn active" onclick="selectAlgorithm('caesar')" id="btn-caesar">
                Caesar Cipher
            </button>
            <button class="btn algorithm-btn" onclick="selectAlgorithm('hill')" id="btn-hill">
                Hill Cipher
            </button>
            <button class="btn algorithm-btn" onclick="selectAlgorithm('playfair')" id="btn-playfair">
                Playfair Cipher
            </button>
        </div>

        <div class="grid grid-2">
            <div class="card">
                <h3>🔒 Encrypt Message</h3>
                <form id="encrypt-form">
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea id="plaintext" class="form-textarea" placeholder="Enter message to encrypt"
                            required></textarea>
                    </div>
                    <div class="form-group" id="key-group-encrypt">
                        <label class="form-label" id="key-label-encrypt">Shift</label>
                        <input type="text" id="key-encrypt" class="form-input" placeholder="3" value="3" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Send To (Optional)</label>
                        <select id="receiver" class="form-select">
                            <option value="">-- Don't send --</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success" style="width: 100%;">Encrypt</button>
                </form>
                <div id="encrypt-result" class="hidden">
                    <h4 class="mt-3">Encrypted Message:</h4>
                    <div class="result-box" id="encrypted-text"></div>
                    <button class="btn btn-outline mt-2" onclick="copyToClipboard('encrypted-text')">📋 Copy</button>
                </div>
            </div>

            <div class="card">
                <h3>🔓 Decrypt Message</h3>
                <form id="decrypt-form">
                    <div class="form-group">
                        <label class="form-label">Encrypted Message</label>
                        <textarea id="ciphertext" class="form-textarea" placeholder="Enter encrypted message"
                            required></textarea>
                    </div>
                    <div class="form-group" id="key-group-decrypt">
                        <label class="form-label" id="key-label-decrypt">Shift</label>
                        <input type="text" id="key-decrypt" class="form-input" placeholder="3" value="3" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Decrypt</button>
                </form>
                <div id="decrypt-result" class="hidden">
                    <h4 class="mt-3">Decrypted Message:</h4>
                    <div class="result-box" id="decrypted-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/encryption.js"></script>
    <script src="js/matrix.js"></script>
</body>

</html>
